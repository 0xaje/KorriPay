# KorriPay — Staging Compose
# Usage: docker compose -f docker-compose.staging.yml up -d

version: '3.9'

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '50m'
    max-file: '5'

services:
  # ─────────────────────────────────────────────────────
  # Backend API
  # ─────────────────────────────────────────────────────
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-korripay}/korripay-backend:staging-latest
    container_name: korripay-backend-staging
    restart: unless-stopped
    ports:
      - '3001:3000'          # staging runs on 3001
    environment:
      NODE_ENV: staging
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      # Add your staging-specific env vars here or use a secrets file
    env_file:
      - .env.staging
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:3000/api/v1/giwa/services']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging: *default-logging
    networks:
      - korripay-net

  # ─────────────────────────────────────────────────────
  # PostgreSQL (staging database)
  # ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: korripay-db-staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: korripay_staging
    volumes:
      - postgres-staging-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - korripay-net

  # ─────────────────────────────────────────────────────
  # Nginx reverse proxy
  # ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: korripay-nginx-staging
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/ssl/korripay:ro
    depends_on:
      - backend
    logging: *default-logging
    networks:
      - korripay-net

volumes:
  postgres-staging-data:

networks:
  korripay-net:
    driver: bridge
