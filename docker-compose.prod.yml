# KorriPay — Production Compose
# Usage: docker compose -f docker-compose.prod.yml up -d

version: '3.9'

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '100m'
    max-file: '10'

services:
  # ─────────────────────────────────────────────────────
  # Backend API (2 replicas for blue/green swap)
  # ─────────────────────────────────────────────────────
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-korripay}/korripay-backend:latest
    restart: always
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:3000/api/v1/giwa/services']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    networks:
      - korripay-net
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # ─────────────────────────────────────────────────────
  # PostgreSQL (production database)
  # ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: korripay-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: korripay
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - korripay-net
    security_opt:
      - no-new-privileges:true

  # ─────────────────────────────────────────────────────
  # Nginx reverse proxy + TLS termination
  # ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: korripay-nginx-prod
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/ssl/korripay:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      backend:
        condition: service_healthy
    logging: *default-logging
    networks:
      - korripay-net
    security_opt:
      - no-new-privileges:true

  # ─────────────────────────────────────────────────────
  # Prometheus metrics scraping
  # ─────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: korripay-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - '9090:9090'
    networks:
      - korripay-net

volumes:
  postgres-prod-data:
  nginx-cache:
  prometheus-data:

networks:
  korripay-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
