services:
  postgres:
    image: postgres:16-alpine
    container_name: korri-postgres-dev
    environment:
      POSTGRES_USER: korri_user
      POSTGRES_PASSWORD: korri_secure_pass
      POSTGRES_DB: korripay_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U korri_user -d korripay_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: korri-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/dev.Dockerfile
    container_name: korri-api-dev
    command: pnpm --filter @korripay/api start
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - DATABASE_URL=postgresql://korri_user:korri_secure_pass@postgres:5432/korripay_db?schema=public
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/dev.Dockerfile
    container_name: korri-web-dev
    command: pnpm --filter @korripay/web dev --host
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:latest
    container_name: korri-prometheus-dev
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: korri-grafana-dev
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
