name: CD — Production Deployment

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'         # e.g. v1.2.3
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'  # e.g. v1.2.3-rc.1
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (e.g. staging-abc1234)'
        required: true
      confirm:
        description: 'Type "deploy-to-production" to confirm'
        required: true

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/korripay-backend
  ENVIRONMENT: production

jobs:
# ─────────────────────────────────────────────────────────────────────────────
# JOB 0 · Manual deploy guard
# ─────────────────────────────────────────────────────────────────────────────
  guard:
    name: '🛡 Deploy Guard'
    runs-on: ubuntu-latest
    steps:
      - name: Check manual confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ "${{ github.event.inputs.confirm }}" != "deploy-to-production" ]]; then
            echo "::error::Manual production deploys require confirmation string 'deploy-to-production'"
            exit 1
          fi

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 · Build & Push production-tagged image
# ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: '🐳 Build & Push — production image'
    runs-on: ubuntu-latest
    needs: guard
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=KorriPay Backend
            org.opencontainers.image.description=KorriPay Fintech Platform Backend

      - name: Build and push production image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: production
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
            NODE_ENV=production
            APP_VERSION=${{ github.ref_name }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the production image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "true"
        continue-on-error: true

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 · Production Container Security Scan
# ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: '🔐 Security Scan — Production image'
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy (CRITICAL only — blocks deploy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: table
          severity: CRITICAL
          exit-code: '1'      # BLOCK production deploy on CRITICAL CVEs

      - name: Run Trivy SARIF report (full)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-prod.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
        if: always()

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-prod.sarif
        continue-on-error: true

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 · Deploy to Production (requires GitHub Environment approval)
# ─────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: '🚀 Deploy — Production'
    runs-on: ubuntu-latest
    needs: [build-and-push, security-scan]
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Production
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            $PROD_USER@$PROD_HOST bash -s << 'ENDSSH'

          set -euo pipefail

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo " KorriPay Production Deployment"
          echo " Tag: $IMAGE_TAG"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          echo "🔐 Authenticating to GHCR..."
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin

          echo "📦 Pulling production image $IMAGE_TAG..."
          docker pull $REGISTRY/$IMAGE_NAME:$IMAGE_TAG

          # ── Zero-downtime blue/green swap ──────────────────────────────────
          COMPOSE="/opt/korripay/docker-compose.prod.yml"
          CURRENT=$(docker compose -f $COMPOSE ps -q backend | head -1)

          echo "🗄  Running database migrations..."
          docker run --rm \
            -e DATABASE_URL="$DATABASE_URL" \
            $REGISTRY/$IMAGE_NAME:$IMAGE_TAG \
            sh -c "cd /app/backend && npx prisma migrate deploy"

          echo "♻️  Starting new backend container..."
          docker compose -f $COMPOSE \
            up -d --no-deps --force-recreate --scale backend=2 backend

          echo "⏳ Waiting for new instance to be healthy..."
          for i in {1..30}; do
            if curl -sf http://localhost:3000/api/v1/giwa/services > /dev/null; then
              echo "  ✅ New instance is healthy"
              break
            fi
            echo "  ⏳ Attempt $i/30..."
            sleep 5
          done

          echo "🔻 Draining old backend instance..."
          docker compose -f $COMPOSE scale backend=1

          echo "🏷  Tagging deployed image..."
          docker tag \
            $REGISTRY/$IMAGE_NAME:$IMAGE_TAG \
            $REGISTRY/$IMAGE_NAME:deployed-$(date +%Y%m%d-%H%M%S)

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo " ✅ Production deployment complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ENDSSH

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          body: |
            ## KorriPay ${{ github.ref_name }}

            **Docker Image:** `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }}`
            **Digest:** `${{ needs.build-and-push.outputs.image-digest }}`

            ### Deployment
            - ✅ Security scan passed
            - ✅ Database migrations applied
            - ✅ Zero-downtime blue/green deployment
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') }}

      - name: Notify Slack — Production deployed
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '🎉' || '🚨' }} *Production Deploy* — `${{ github.ref_name }}` — ${{ job.status }}\nImage: `${{ needs.build-and-push.outputs.image-tag }}`\n<${{ vars.PRODUCTION_URL }}|Open Production>",
              "username": "KorriPay CD",
              "icon_emoji": ":rocket:"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 · Post-deploy Production Smoke Test
# ─────────────────────────────────────────────────────────────────────────────
  smoke-test-production:
    name: '💨 Smoke Test — Production'
    runs-on: ubuntu-latest
    needs: deploy-production
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Production smoke tests
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          BASE="${PRODUCTION_URL:-https://korripay.com}"
          echo "Smoke-testing $BASE ..."

          check() {
            local url="$1"
            local expected_status="${2:-200}"
            local http_status
            http_status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url")
            if [[ "$http_status" == "$expected_status" ]]; then
              echo "  ✅ $url → $http_status"
            else
              echo "  ❌ $url → $http_status (expected $expected_status)"
              return 1
            fi
          }

          check "$BASE/api/v1/giwa/services"
          check "$BASE/api/fx/rates"
          check "$BASE/api/auth/nonce"
          check "$BASE/api/wallet"    "401"
          check "$BASE/api/admin/users" "401"

          echo "✅ All production smoke tests passed."

      - name: Rollback on smoke failure
        if: failure()
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          echo "::error::Smoke tests failed — triggering rollback..."
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            $PROD_USER@$PROD_HOST bash -s << 'ENDSSH'
          COMPOSE="/opt/korripay/docker-compose.prod.yml"
          # Restore the previously deployed image
          PREV_TAG=$(docker images --format '{{.Tag}}' ghcr.io/*/korripay-backend \
            | grep 'deployed-' | sort -r | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            docker compose -f $COMPOSE up -d --force-recreate backend
            echo "⏪ Rolled back to $PREV_TAG"
          fi
          ENDSSH
