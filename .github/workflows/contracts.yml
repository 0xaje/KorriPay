name: CD — Contract Deployment

on:
  push:
    tags:
      - 'contracts-v[0-9]+.[0-9]+.[0-9]+'   # e.g. contracts-v1.0.0
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        type: choice
        options: [mantle-testnet, mantle-mainnet, localhost]
        default: mantle-testnet
      contracts:
        description: 'Contracts to deploy (comma-separated or "all")'
        required: false
        default: 'all'
      verify:
        description: 'Verify contracts on explorer after deploy?'
        required: false
        type: boolean
        default: true

concurrency:
  group: contract-deploy-${{ github.event.inputs.network || 'mainnet' }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  SOLIDITY_VERSION: '0.8.20'

jobs:
# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 · Compile & Verify compilation
# ─────────────────────────────────────────────────────────────────────────────
  compile:
    name: '📜 Compile Contracts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run contract unit tests
        run: npx hardhat test

      - name: Cache compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-artifacts
          path: |
            artifacts/
            cache/
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 · Slither security scan (gate for production)
# ─────────────────────────────────────────────────────────────────────────────
  slither:
    name: '🔐 Slither Audit'
    runs-on: ubuntu-latest
    needs: compile
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Restore artifacts
        uses: actions/download-artifact@v4
        with:
          name: contract-artifacts

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: contracts/
          solc-version: ${{ env.SOLIDITY_VERSION }}
          fail-on: high
          sarif: slither.sarif
        continue-on-error: true

      - name: Upload Slither results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: slither.sarif
        continue-on-error: true

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 · Deploy to Testnet (Mantle Testnet)
# ─────────────────────────────────────────────────────────────────────────────
  deploy-testnet:
    name: '🚀 Deploy — Mantle Testnet'
    runs-on: ubuntu-latest
    needs: [compile, slither]
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.network == 'mantle-testnet' || github.event.inputs.network == 'localhost')
    environment:
      name: testnet
      url: https://testnet.mantlescan.xyz

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Restore artifacts
        uses: actions/download-artifact@v4
        with:
          name: contract-artifacts

      - name: Write Hardhat config with testnet support
        run: |
          cat > hardhat.config.js << 'EOF'
          import "@nomicfoundation/hardhat-toolbox";

          const config = {
            solidity: {
              version: "0.8.20",
              settings: { optimizer: { enabled: true, runs: 200 } }
            },
            networks: {
              "mantle-testnet": {
                url: "https://rpc.testnet.mantle.xyz",
                chainId: 5001,
                accounts: [process.env.DEPLOYER_PRIVATE_KEY],
                gasPrice: "auto"
              },
              localhost: {
                url: "http://127.0.0.1:8545",
                chainId: 31337
              }
            },
            etherscan: {
              apiKey: {
                "mantle-testnet": process.env.MANTLESCAN_API_KEY || ""
              },
              customChains: [{
                network: "mantle-testnet",
                chainId: 5001,
                urls: {
                  apiURL: "https://explorer.testnet.mantle.xyz/api",
                  browserURL: "https://explorer.testnet.mantle.xyz"
                }
              }]
            }
          };

          export default config;
          EOF

      - name: Deploy to ${{ github.event.inputs.network }}
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY_TESTNET }}
          MANTLESCAN_API_KEY: ${{ secrets.MANTLESCAN_API_KEY }}
        run: |
          TARGET="${{ github.event.inputs.network }}"
          echo "Deploying to $TARGET..."
          npx hardhat run deploy/deploy.js --network "$TARGET" | tee deploy-output.txt

          # Parse and save deployed addresses
          grep -E "deployed to:" deploy-output.txt > deployed-addresses.txt || true
          cat deployed-addresses.txt

      - name: Verify contracts
        if: github.event.inputs.verify == 'true' && github.event.inputs.network == 'mantle-testnet'
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY_TESTNET }}
          MANTLESCAN_API_KEY: ${{ secrets.MANTLESCAN_API_KEY }}
        run: |
          # Extract addresses from deploy output and verify
          while IFS= read -r line; do
            CONTRACT=$(echo "$line" | awk '{print $1}')
            ADDRESS=$(echo "$line" | grep -oE '0x[0-9a-fA-F]+')
            if [ -n "$ADDRESS" ]; then
              echo "Verifying $CONTRACT at $ADDRESS..."
              npx hardhat verify --network mantle-testnet "$ADDRESS" || true
            fi
          done < deployed-addresses.txt
        continue-on-error: true

      - name: Save deployment record
        uses: actions/upload-artifact@v4
        with:
          name: testnet-deployment-${{ github.sha }}
          path: |
            deploy-output.txt
            deployed-addresses.txt
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 · Deploy to Mainnet (Mantle) — requires tag + approval
# ─────────────────────────────────────────────────────────────────────────────
  deploy-mainnet:
    name: '🚀 Deploy — Mantle Mainnet'
    runs-on: ubuntu-latest
    needs: [compile, slither]
    if: |
      startsWith(github.ref, 'refs/tags/contracts-v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.network == 'mantle-mainnet')
    environment:
      name: mainnet-contracts
      url: https://mantlescan.xyz

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Restore artifacts
        uses: actions/download-artifact@v4
        with:
          name: contract-artifacts

      - name: Write production Hardhat config
        run: |
          cat > hardhat.config.js << 'EOF'
          import "@nomicfoundation/hardhat-toolbox";

          const config = {
            solidity: {
              version: "0.8.20",
              settings: { optimizer: { enabled: true, runs: 200 } }
            },
            networks: {
              "mantle-mainnet": {
                url: "https://rpc.mantle.xyz",
                chainId: 5000,
                accounts: [process.env.DEPLOYER_PRIVATE_KEY],
                gasPrice: "auto"
              }
            },
            etherscan: {
              apiKey: { "mantle-mainnet": process.env.MANTLESCAN_API_KEY || "" },
              customChains: [{
                network: "mantle-mainnet",
                chainId: 5000,
                urls: {
                  apiURL: "https://api.mantlescan.xyz/api",
                  browserURL: "https://mantlescan.xyz"
                }
              }]
            }
          };
          export default config;
          EOF

      - name: Deploy to Mantle Mainnet
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY_MAINNET }}
          MANTLESCAN_API_KEY: ${{ secrets.MANTLESCAN_API_KEY }}
        run: |
          echo "⚠️  Deploying to MAINNET — this is irreversible."
          npx hardhat run deploy/deploy.js --network mantle-mainnet | tee deploy-mainnet-output.txt
          grep -E "deployed to:" deploy-mainnet-output.txt > deployed-mainnet-addresses.txt || true
          echo "Deployed contracts:"
          cat deployed-mainnet-addresses.txt

      - name: Verify contracts on Mantlescan
        if: github.event.inputs.verify != 'false'
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY_MAINNET }}
          MANTLESCAN_API_KEY: ${{ secrets.MANTLESCAN_API_KEY }}
        run: |
          while IFS= read -r line; do
            ADDRESS=$(echo "$line" | grep -oE '0x[0-9a-fA-F]+')
            if [ -n "$ADDRESS" ]; then
              npx hardhat verify --network mantle-mainnet "$ADDRESS" || true
            fi
          done < deployed-mainnet-addresses.txt
        continue-on-error: true

      - name: Save mainnet deployment record
        uses: actions/upload-artifact@v4
        with:
          name: mainnet-deployment-${{ github.sha }}
          path: |
            deploy-mainnet-output.txt
            deployed-mainnet-addresses.txt
          retention-days: 365

      - name: Create contract deployment release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: deployed-mainnet-addresses.txt
          generate_release_notes: false
          body: |
            ## Contract Deployment — ${{ github.ref_name }}

            All contracts deployed to **Mantle Mainnet**.

            | Contract | Address |
            |---|---|
            See attached `deployed-mainnet-addresses.txt`

      - name: Notify Slack — Contracts deployed
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '📜✅' || '📜❌' }} *Contract Deploy* — Mainnet — ${{ job.status }}\nTag: `${{ github.ref_name }}`\n<https://mantlescan.xyz|View on Mantlescan>",
              "username": "KorriPay Contracts",
              "icon_emoji": ":scroll:"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
